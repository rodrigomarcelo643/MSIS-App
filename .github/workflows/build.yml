name: MedSIS Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Patch Podfile - Force C++17 for all pod targets
        run: |
          python3 - << 'PYEOF'
          with open('ios/Podfile', 'r') as f:
              content = f.read()

          patch = """
          # CI patch: force C++17 to fix fmt/Folly compilation on Xcode 15+
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
                config.build_settings['CLANG_CXX_LIBRARY'] = 'libc++'
              end
            end
          end
          """

          with open('ios/Podfile', 'a') as f:
              f.write(patch)

          print("Podfile patched successfully")
          PYEOF

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Simulator - arm64 only for Apple Silicon runner)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/MSIS.xcworkspace \
                     -scheme MSIS \
                     -sdk iphonesimulator \
                     -configuration Release \
                     -derivedDataPath build \
                     EXCLUDED_ARCHS=x86_64 \
                     ONLY_ACTIVE_ARCH=NO \
                     OTHER_CPLUSPLUSFLAGS='$(inherited) -std=c++17 -stdlib=libc++' \
                     clean build | xcpretty

      - name: Compress iOS App
        run: |
          tar -czf MSIS-Simulator.tar.gz -C build/Build/Products/Release-iphonesimulator MSIS.app

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: MSIS-Simulator.tar.gz
